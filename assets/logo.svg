<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep navy-black -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1B30"/>
      <stop offset="50%" stop-color="#091428"/>
      <stop offset="100%" stop-color="#050C18"/>
    </linearGradient>

    <!-- Sphere radial gradient: offset for 3D feel -->
    <radialGradient id="sphere" cx="42%" cy="38%" r="55%" fx="42%" fy="38%">
      <stop offset="0%" stop-color="#2680EB"/>
      <stop offset="30%" stop-color="#1A6ADF"/>
      <stop offset="55%" stop-color="#1050B8"/>
      <stop offset="80%" stop-color="#0A3580"/>
      <stop offset="100%" stop-color="#061E55"/>
    </radialGradient>

    <!-- Sphere bottom shadow -->
    <radialGradient id="sphereShadow" cx="50%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#020810" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0"/>
    </radialGradient>

    <!-- Center glow: bright cyan -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="1"/>
      <stop offset="25%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#0EA5E9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient glow behind sphere -->
    <radialGradient id="ambientGlow" cx="50%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#6366F1" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring gradient: cyan → blue → violet -->
    <linearGradient id="ringGrad" x1="10%" y1="80%" x2="90%" y2="20%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="30%" stop-color="#38BDF8"/>
      <stop offset="55%" stop-color="#0A84FF"/>
      <stop offset="80%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Ring glow (for blurred layer) -->
    <linearGradient id="ringGlowGrad" x1="10%" y1="80%" x2="90%" y2="20%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Glass highlight: Apple-style top shine -->
    <linearGradient id="glass" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Sphere edge glow -->
    <radialGradient id="edgeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="88%" stop-color="transparent"/>
      <stop offset="96%" stop-color="#0A84FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.08"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="ringBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <filter id="coreBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ambientBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <!-- Clip for glass highlight -->
    <clipPath id="bgClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- ============================================ -->
  <!-- LAYER 1: Background squircle                 -->
  <!-- ============================================ -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle noise/texture via micro-gradient overlay -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)" opacity="0.3"/>

  <!-- ============================================ -->
  <!-- LAYER 2: Deep ambient glow                   -->
  <!-- ============================================ -->
  <circle cx="512" cy="490" r="440" fill="url(#ambientGlow)" filter="url(#ambientBlur)"/>

  <!-- Secondary violet ambient (bottom-right) -->
  <circle cx="600" cy="600" r="300" fill="#6366F1" opacity="0.03" filter="url(#ambientBlur)"/>

  <!-- ============================================ -->
  <!-- LAYER 3: Main sphere                         -->
  <!-- ============================================ -->
  <!-- Slightly elliptical for speed/dynamism feel -->
  <ellipse cx="512" cy="510" rx="265" ry="255"
           fill="url(#sphere)"/>

  <!-- Sphere bottom shadow for depth -->
  <ellipse cx="512" cy="545" rx="230" ry="200"
           fill="url(#sphereShadow)"/>

  <!-- Sphere edge glow -->
  <ellipse cx="512" cy="510" rx="265" ry="255"
           fill="url(#edgeGlow)"/>

  <!-- ============================================ -->
  <!-- LAYER 4: THE SIGNATURE RING (open spiral)    -->
  <!-- ============================================ -->

  <!-- Ring soft glow (blurred behind) -->
  <path d="M 705,537 A 195,195 0 1,1 632,356"
        stroke="url(#ringGlowGrad)" stroke-width="36" fill="none"
        stroke-linecap="round" opacity="0.35"
        filter="url(#softBlur)"/>

  <!-- Main ring: 300° arc, gap at upper-right -->
  <!-- Start: 8° (just below 3 o'clock) -->
  <!-- End: 308° (just past 10 o'clock going clockwise) -->
  <!-- Creates a 60° gap at the "1 o'clock" position -->
  <path d="M 705,537 A 195,195 0 1,1 632,356"
        stroke="url(#ringGrad)" stroke-width="26" fill="none"
        stroke-linecap="round"
        filter="url(#ringBlur)"/>

  <!-- Echo ring: outer, thinner, offset gap for spiral feel -->
  <!-- Radius 235, arc from 15° to 300° (285° sweep) -->
  <path d="M 739,571 A 235,235 0 1,1 630,306"
        stroke="url(#ringGrad)" stroke-width="4" fill="none"
        stroke-linecap="round" opacity="0.20"/>

  <!-- Inner whisper ring: subtle, smaller, offset gap -->
  <!-- Radius 145, arc from 0° to 260° -->
  <path d="M 657,510 A 145,145 0 1,1 487,367"
        stroke="url(#ringGrad)" stroke-width="3" fill="none"
        stroke-linecap="round" opacity="0.12"/>

  <!-- ============================================ -->
  <!-- LAYER 5: Center glow (the "alive" core)      -->
  <!-- ============================================ -->
  <!-- Outer glow -->
  <circle cx="512" cy="500" r="85" fill="url(#centerGlow)"/>

  <!-- Core bright point -->
  <circle cx="512" cy="500" r="20" fill="#7DD3FC" opacity="0.65"
          filter="url(#coreBlur)"/>

  <!-- Core white hot center -->
  <circle cx="512" cy="500" r="7" fill="#FFFFFF" opacity="0.90"/>

  <!-- Tiny specular -->
  <circle cx="509" cy="497" r="3" fill="#FFFFFF" opacity="0.95"/>

  <!-- ============================================ -->
  <!-- LAYER 6: Glass highlight (Apple-style shine)  -->
  <!-- ============================================ -->
  <ellipse cx="440" cy="370" rx="175" ry="110"
           fill="url(#glass)"
           transform="rotate(-12, 440, 370)"
           clip-path="url(#bgClip)"/>

  <!-- ============================================ -->
  <!-- LAYER 7: Speed/motion accent lines            -->
  <!-- ============================================ -->
  <!-- Subtle curved lines near the ring suggesting velocity -->
  <path d="M 280,385 Q 310,355 355,340"
        stroke="#38BDF8" stroke-width="2" fill="none"
        stroke-linecap="round" opacity="0.10"/>

  <path d="M 255,430 Q 285,400 330,385"
        stroke="#22D3EE" stroke-width="1.5" fill="none"
        stroke-linecap="round" opacity="0.08"/>

  <path d="M 700,660 Q 670,690 625,700"
        stroke="#8B5CF6" stroke-width="2" fill="none"
        stroke-linecap="round" opacity="0.10"/>

  <path d="M 725,620 Q 695,650 650,660"
        stroke="#6366F1" stroke-width="1.5" fill="none"
        stroke-linecap="round" opacity="0.08"/>

  <!-- ============================================ -->
  <!-- LAYER 8: Micro highlights for premium feel    -->
  <!-- ============================================ -->
  <!-- Tiny orbital dots along the ring path -->
  <circle cx="370" cy="700" r="4" fill="#38BDF8" opacity="0.25"/>
  <circle cx="315" cy="580" r="3" fill="#22D3EE" opacity="0.20"/>
  <circle cx="710" cy="455" r="3" fill="#8B5CF6" opacity="0.20"/>

  <!-- Ring endpoint accent dots -->
  <circle cx="705" cy="537" r="5" fill="#22D3EE" opacity="0.50"
          filter="url(#coreBlur)"/>
  <circle cx="632" cy="356" r="5" fill="#8B5CF6" opacity="0.50"
          filter="url(#coreBlur)"/>
</svg>
