<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8dee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c6cf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b8dee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#8bb4ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#5b7cee;stop-opacity:0.7" />
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle radial ambient -->
  <circle cx="512" cy="480" r="340" fill="#5b8dee" opacity="0.04"/>

  <!-- Outer ring — the "aether" orbit -->
  <circle cx="512" cy="500" r="280" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.3"/>
  <circle cx="512" cy="500" r="320" fill="none" stroke="#5b8dee" stroke-width="1.5" opacity="0.12"/>

  <!-- Main symbol — stylized "A" formed by converging lines -->
  <!-- Left stroke -->
  <line x1="310" y1="720" x2="512" y2="260" stroke="url(#glow)" stroke-width="42" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Right stroke -->
  <line x1="714" y1="720" x2="512" y2="260" stroke="url(#glow)" stroke-width="42" stroke-linecap="round" filter="url(#softglow)"/>
  <!-- Cross bar -->
  <line x1="370" y1="560" x2="654" y2="560" stroke="url(#inner)" stroke-width="30" stroke-linecap="round" filter="url(#softglow)"/>

  <!-- Apex node — the cognitive point -->
  <circle cx="512" cy="260" r="24" fill="#8bb4ff" filter="url(#softglow)"/>
  <circle cx="512" cy="260" r="12" fill="white" opacity="0.9"/>

  <!-- Small orbital dots -->
  <circle cx="680" cy="340" r="8" fill="#5b8dee" opacity="0.6"/>
  <circle cx="344" cy="340" r="8" fill="#7c6cf0" opacity="0.6"/>
  <circle cx="512" cy="760" r="6" fill="#5b8dee" opacity="0.3"/>

  <!-- Three small connection arcs representing panels/workspace -->
  <path d="M 370 560 Q 310 640 310 720" fill="none" stroke="#5b8dee" stroke-width="2" opacity="0.25"/>
  <path d="M 654 560 Q 714 640 714 720" fill="none" stroke="#5b8dee" stroke-width="2" opacity="0.25"/>

  <!-- Bottom base nodes -->
  <circle cx="310" cy="720" r="14" fill="#5b8dee" opacity="0.5" filter="url(#softglow)"/>
  <circle cx="714" cy="720" r="14" fill="#5b8dee" opacity="0.5" filter="url(#softglow)"/>
</svg>
